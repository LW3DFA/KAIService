<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>KaiTrack - Fernando Albornoz</title>
	<!-- ICONO -->
    <link rel="icon" type="image/png" href="favicon.png">
	<link rel="apple-touch-icon" href="favicon.png">
    <link rel="stylesheet" href="css/styles.css">
	  <!-- Enlace CDN de Material Symbols Outlined -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
</head>

<body>

<div class="container">

		<!-- Cabecera con Logo Banner Completo -->
        <header class="app-header">
            <!-- logo de 1200 x 250 -->
            <img src="img/logo.png" alt="KaiTrack - Gestión de Servicio Técnico" class="app-logo">
        </header>
		
		<h2><span class="material-symbols-outlined" style="color: #F54927; vertical-align: middle;">vpn_key</span> Acceso <span class="material-symbols-outlined" style="color: #F54927; vertical-align: middle;">vpn_key</span></h2>

<input
    type="password"
    id="password"
    placeholder="Contraseña">

<br><br>

<button onclick="login()">
Ingresar
</button>

</div>

<script>

async function login() {

    const password =
        document
        .getElementById('password')
        .value;

    const response =
        await fetch(
            '/.netlify/functions/check-password',
            {
                method:'POST',
                body: JSON.stringify({
                    password
                })
            }
        );

    if (response.ok) {

        sessionStorage.setItem(
            'kai_auth',
            'ok'
        );

        location.href =
            'index.html';

    } else {

        alert(
            'Contraseña incorrecta'
        );
    }
}

</script>

</body>

</html>
