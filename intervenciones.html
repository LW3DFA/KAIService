<!DOCTYPE html>
<html lang="es">
<!--- KaiTrack - Gestión de Servicio Técnico --->
<!--- Fernando Albornoz @Copyright 2026 V1.0    --->
<!--- Reparaciones / Intervenciones Service  --->

   <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>KaiTrack - Fernando Albornoz</title>

    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="container">
    
        <!-- Cabecera con Logo Banner Completo -->
        <header class="app-header">
            <!-- logo de 1200 x 250 -->
            <img src="img/logo.png" alt="KaiTrack - Gestión de Servicio Técnico" class="app-logo">
        </header>

        <!-- Menú de Navegación justo debajo del Logo -->

		<div class="menu-superior">

		<button onclick="location.href='index.html'">
        🏠&nbsp;Inicio
		</button>

		<button onclick="location.href='clientes.html'">
        ‍🧑‍💼&nbsp;Clientes
		</button>

		<button onclick="location.href='maquinas.html'">
        🔧&nbsp;Máquinas
		</button>

		<button onclick="location.href='ordenes.html'">
        📋&nbsp;Órdenes
		</button>

		</div>

		<hr>

		<h2>🔧 Reparaciones / Intervenciones</h2>

		<div id="datosOrden"></div>

		<hr>

		<input type="hidden" id="intervencion_id">

		<label>Trabajo realizado</label><br>
		<textarea id="trabajo_realizado"
		rows="4"
		style="width:100%;"></textarea>

		<br><br>

		<label>Tiempo empleado (horas)</label><br>
		<input type="number"
		id="tiempo_empleado"
		step="0.5">

		<br><br>

		<label>Costo Mano de Obra ($)</label>
		<input
		type="number"
		id="costo_mano_obra"
		step="0.01"
		value="0">

		<br><br>

		<label>Costo Repuestos ($)</label>
		<input
		type="number"
		id="costo_repuestos"
		step="0.01"
		value="0">

		<br><br>
	
		<label>Repuestos utilizados</label><br>
		<input type="text"
		id="repuestos_utilizados">

		<br><br>

		<label>Observaciones</label><br>
		<textarea id="obs_intervencion"
		rows="3"
		style="width:100%;"></textarea>

		<br><br>

		<button onclick="guardarIntervencion()">
		💾 Guardar Intervención
		</button>

		<hr>

		<h3>Historial OT</h3>

		<div id="listaIntervenciones"></div>
	
	</div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/app.js"></script>
	
</body>

</html>
