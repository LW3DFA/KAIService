<div class="menu-superior">

	<div id="datosOrden"></div>

	<hr>

	<input type="hidden" id="intervencion_id">

	<label>Trabajo realizado</label><br>
	<textarea id="trabajo_realizado"
	rows="4"
	style="width:100%;"></textarea>

	<br><br>

	<label>Tiempo empleado (horas)</label><br>
	<input type="number"
	id="tiempo_empleado"
	step="0.5">

	<br><br>

	<label>Repuestos utilizados</label><br>
	<input type="text"
	id="repuestos_utilizados">

	<br><br>

	<label>Observaciones</label><br>
	<textarea id="obs_intervencion"
	rows="3"
	style="width:100%;"></textarea>

	<br><br>

	<button onclick="guardarIntervencion()">
	💾 Guardar Intervención
	</button>

	<hr>

	<h3>Historial</h3>

	<div id="listaIntervenciones"></div>
