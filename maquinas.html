<h2>Máquinas Registradas</h2>

<select
    id="filtro_cliente_maquinas"
    onchange="listarMaquinas()">

    </option>

</select>

<button onclick="listarMaquinas()">
    🚀 Actualizar Máquinas
</button>

<div id="listaMaquinas"></div>


<h2>Nueva Máquina</h2>

<!--- Identificación de máquina --->
<input type="hidden" id="maquina_id" value="">

</select>

<br><br>

<input type="text" id="ubicacion" placeholder="Ubicación"><br><br>

<textarea id="obs_maquina"
placeholder="Observaciones"></textarea><br><br>

<!--- Agrega unn ID a la máquina al guardar --->

Guardar Máquina
</button>
